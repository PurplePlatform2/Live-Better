name: tester AI 08035796220 trial

on:
  workflow_dispatch:

# Cancel any previous run of THIS workflow immediately (extra safety)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


permissions:
  actions: write          # required to cancel other workflow runs
  contents: read

jobs:
  # ──────────────────────────────────────────────────
  #  PRE‑JOB – cancel ALL other running workflows
  # ──────────────────────────────────────────────────
  cancel-others:
    runs-on: ubuntu-latest
    steps:
      - name: Cancel every other running workflow
        uses: actions/github-script@v7
        with:
          script: |
            const currentRunId = context.runId;
            const repo = context.repo;

            // Fetch all workflow runs that are in progress or queued
            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              {
                ...repo,
                status: "in_progress",
              }
            );

            for (const run of runs) {
              // Skip the current run itself
              if (run.id === currentRunId) {
                console.log(`Skipping current run ${run.id}`);
                continue;
              }
              console.log(`Cancelling run ${run.id} (${run.name}) from workflow "${run.workflow_id}"`);
              await github.rest.actions.cancelWorkflowRun({
                ...repo,
                run_id: run.id,
              });
            }

            // Also cancel queued runs (sometimes listed separately)
            const queuedRuns = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              {
                ...repo,
                status: "queued",
              }
            );
            for (const run of queuedRuns) {
              if (run.id === currentRunId) continue;
              console.log(`Cancelling queued run ${run.id} (${run.name})`);
              await github.rest.actions.cancelWorkflowRun({
                ...repo,
                run_id: run.id,
              });
            }

  # ──────────────────────────────────────────────────
  #  JOB 1 – starts with default auth.txt from repo
  # ──────────────────────────────────────────────────
  run1:
    needs: cancel-others
    runs-on: ubuntu-latest
    timeout-minutes: 420
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run live.py (6h max, timeout = success)
        run: |
          pip install requests
          timeout 21600 python live.py  
          STATUS=$?
          if [ $STATUS -eq 124 ]; then
            echo "6‑hour timeout reached – exiting successfully"
            exit 0
          else
            exit $STATUS
          fi
        shell: bash
      - name: Upload auth artifact (always, even after error)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-run1
          path: auth.txt
          retention-days: 1

  # ──────────────────────────────────────────────────
  #  JOBS 2 through 28 (unchanged, all need: cancel-others → previous job)
  #  I’m compressing them here to keep the answer focused.
  #  They are identical to your original, only adding `needs: cancel-others` at the beginning
  #  and adjusting the `needs` chain accordingly.
  #
  #  For brevity I’m showing the pattern – just replace the whole block
  #  with the full sequence you already have, but ensure run1 depends on cancel-others.
  # ──────────────────────────────────────────────────
  run2:
    needs: run1
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 420
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Download auth from previous run
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: auth-run1
          path: .
      - name: Run live.py (6h max, timeout = success)
        run: |
          pip install requests
          timeout 21600 python live.py
          STATUS=$?
          if [ $STATUS -eq 124 ]; then
            echo "6‑hour timeout reached – exiting successfully"
            exit 0
          else
            exit $STATUS
          fi
        shell: bash
      - name: Upload auth artifact (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-run2
          path: auth.txt
          retention-days: 1

  # ... continue run3..run28 exactly as in your original file,
  #     each depending on the previous job.
