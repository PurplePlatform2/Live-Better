name: Run live.py sequentially for a week

on:

 
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────
  #  JOB 1 – starts with default auth.txt from repo
  # ──────────────────────────────────────────────────
  run1:
    runs-on: ubuntu-latest
    timeout-minutes: 420          # allows overhead beyond 6h
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run live.py (6h max, timeout = success)
        run: |
          pip install requests
          timeout 21600 python live.py || STATUS=$?
          if [ $STATUS -eq 124 ]; then
            echo "6‑hour timeout reached – exiting successfully"
            exit 0
          else
            exit $STATUS
          fi
        shell: bash
      - name: Upload auth artifact (always, even after error)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-${{ github.job }}
          path: auth.txt
          retention-days: 1

  # ──────────────────────────────────────────────────
  #  JOB 2
  # ──────────────────────────────────────────────────
  run2:
    needs: run1
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 420
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Download auth from previous run
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: auth-run1
          path: .
      - name: Run live.py (6h max, timeout = success)
        run: |
          pip install requests
          timeout 21600 python live.py || STATUS=$?
          if [ $STATUS -eq 124 ]; then
