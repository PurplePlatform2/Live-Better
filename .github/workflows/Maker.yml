name: Build liver (all platforms)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  UTHASH_URL: https://raw.githubusercontent.com/troydhanson/uthash/master/src/uthash.h

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant:
          - name: glibc
            target: all
            artifact: liver-linux-glibc
            verify: true
          - name: musl
            target: musl
            artifact: liver-linux-musl
            verify: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            musl-tools \
            libcurl4-openssl-dev \
            libcjson-dev \
            uuid-dev \
            libssl-dev \
            wget

      - name: Download uthash header
        run: |
          mkdir -p include
          wget -q -O include/uthash.h "${UTHASH_URL}"

      - name: Build ${{ matrix.variant.name }} binary
        run: |
          make clean
          make ${{ matrix.variant.target }}

      - name: Verify ${{ matrix.variant.name }} binary
        if: matrix.variant.verify
        run: |
          chmod +x liver
          file liver
          ./liver --help || ./liver --version || ./liver || echo "Binary executed"

      - name: Upload ${{ matrix.variant.name }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant.artifact }}
          path: liver

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2 with toolchain
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-cjson
            wget

      - name: Download uthash header
        run: |
          mkdir -p include
          wget -q -O include/uthash.h "${UTHASH_URL}"

      - name: Build Windows binary
        run: |
          make clean
          make windows

      - name: Verify Windows binary
        run: |
          ls -l liver.exe
          file liver.exe || echo "Binary built successfully"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: liver-windows
          path: liver.exe

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies via Homebrew
        run: |
          brew update
          brew install curl openssl@3 cjson wget

      - name: Download uthash header
        run: |
          mkdir -p include
          wget -q -O include/uthash.h "${UTHASH_URL}"

      - name: Build macOS binary
        run: |
          export CFLAGS="-I$(brew --prefix openssl@3)/include -I$(brew --prefix cjson)/include"
          export LDFLAGS="-L$(brew --prefix openssl@3)/lib -L$(brew --prefix cjson)/lib"
          make clean
          make macos

      - name: Verify macOS binary
        run: |
          chmod +x liver
          file liver
          ./liver --help || ./liver --version || ./liver || echo "Binary executed"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: liver-macos
          path: liver
