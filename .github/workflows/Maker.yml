name: Build liver

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update && apt install -y musl-tools
          sudo apt-get install -y \
            build-essential \
            libcurl4-openssl-dev \
            libcjson-dev \
            uuid-dev \
            libssl-dev \
            wget

      - name: Download uthash
        run: |
          mkdir -p include
          wget -q -O include/uthash.h \
            "https://raw.githubusercontent.com/troydhanson/uthash/master/src/uthash.h"

      - name: Compile (Linux)
        run: make linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liver-linux
          path: liver
