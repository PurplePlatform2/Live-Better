name: Build and Run (Linux)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            make \
            libc6-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            uuid-dev \
            libcjson-dev \
            zlib1g-dev \
            pkg-config \
            wget

      - name: Build project
        run: |
          make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liver-binary
          path: liver

  run:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: liver-binary

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            make \
            libc6-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            uuid-dev \
            libcjson-dev \
            zlib1g-dev \
            pkg-config \
            wget

      - name: Make executable
        run: chmod +x liver

      - name: Execute binary
        run: |
          ./liver || echo "Execution finished (or no output)"
