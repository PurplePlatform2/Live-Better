name: Build liver (all platforms)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # --------------------------------------------------------------------------
  # Linux: gcc static (glibc) + musl‑static
  # --------------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            musl-tools \
            libcurl4-openssl-dev \
            libcjson-dev \
            uuid-dev \
            libssl-dev \
            wget

      - name: Download uthash header
        run: |
          mkdir -p include
          wget -q -O include/uthash.h \
            https://raw.githubusercontent.com/troydhanson/uthash/master/src/uthash.h

      - name: Build static binary (gcc, glibc)
        run: make

      - name: Verify Linux binary
        run: |
          chmod +x liver
          ./liver --help || ./liver --version || ./liver   # adjust depending on your tool

      - name: Build static binary (musl)
        run: make musl
        # the musl binary overwrites 'liver', rename it for upload
      - name: Rename musl artifact
        run: mv liver liver-musl

      - name: Upload glibc artifact
        uses: actions/upload-artifact@v4
        with:
          name: liver-linux-glibc
          path: liver   # note: musl build overwrote it, so we need to re-build?
          # We'll re-build glibc to get it back, or save before musl.
          # Simpler: build glibc first, then build musl, but keep both.
          # Let's restructure: build glibc -> save as liver-glibc, then build musl -> save as liver-musl.
          # I'll adjust the steps below.

# Adjust the Linux job to preserve both binaries:
    # (we'll rewrite cleanly)

# Final corrected Linux job:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential musl-tools \
            libcurl4-openssl-dev libcjson-dev uuid-dev libssl-dev wget

      - name: Download uthash
        run: mkdir -p include && wget -q -O include/uthash.h \
               https://raw.githubusercontent.com/troydhanson/uthash/master/src/uthash.h

      # glibc static
      - name: Build glibc static binary
        run: make clean all   # ensure fresh build
      - name: Verify glibc binary
        run: chmod +x liver && ./liver --help || ./liver --version || ./liver
      - name: Upload glibc artifact
        uses: actions/upload-artifact@v4
        with:
          name: liver-linux-glibc
          path: liver

      # musl static (cleans and rebuilds)
      - name: Build musl static binary
        run: make clean musl
      - name: Verify musl binary
        run: chmod +x liver && ./liver --help || true   # optional test
      - name: Upload musl artifact
        uses: actions/upload-artifact@v4
        with:
          name: liver-linux-musl
          path: liver

  # --------------------------------------------------------------------------
  # Windows: native MinGW‑w64 static build (MSYS2)
  # --------------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            make
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-cJSON   # check if available, else we build manually

      # If cJSON package doesn't exist, build it from source:
      - name: Install cJSON manually (if not found)
        if: failure()
        run: |
          curl -L -o /tmp/cJSON.zip https://github.com/DaveGamble/cJSON/archive/v1.7.15.zip
          unzip /tmp/cJSON.zip -d /tmp
          cd /tmp/cJSON-1.7.15
          make static
          cp cJSON.h /mingw64/include/cjson/cJSON.h
          cp libcjson.a /mingw64/lib/libcjson.a

      - name: Download uthash
        run: |
          mkdir -p include
          curl -L -o include/uthash.h \
            https://raw.githubusercontent.com/troydhanson/uthash/master/src/uthash.h

      - name: Build Windows static binary
        run: |
          export CFLAGS="-I/mingw64/include"
          export LDFLAGS="-L/mingw64/lib"
          make windows

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: liver-windows
          path: liver.exe

  # --------------------------------------------------------------------------
  # macOS: clang with Homebrew libs
  # --------------------------------------------------------------------------
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install curl openssl cjson wget

      - name: Download uthash
        run: |
          mkdir -p include
          wget -q -O include/uthash.h \
            https://raw.githubusercontent.com/troydhanson/uthash/master/src/uthash.h

      - name: Build macOS binary
        run: |
          export CFLAGS="-I/usr/local/opt/openssl/include -I/usr/local/opt/cjson/include"
          export LDFLAGS="-L/usr/local/opt/openssl/lib -L/usr/local/opt/cjson/lib"
          make macos

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: liver-macos
          path: liver
